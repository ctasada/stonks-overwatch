{% load static %}
<!-- Alpaca Settings Section -->
<div id="broker-alpaca" class="broker-section">
    <div class="broker-header">
        <img src="{% static 'brokers/alpaca.png' %}" alt="Alpaca">
        <h4 class="mb-0">Alpaca</h4>
    </div>

    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="alpaca-enabled"
               {% if alpaca_config.enabled %}checked{% endif %}>
        <label class="form-check-label" for="alpaca-enabled">
            Enabled
        </label>
    </div>

    <h6 class="fw-bold mt-4 mb-2">Credentials:</h6>
    <hr class="my-2">

    <div class="settings-form-group">
        <label for="alpaca-api-key" class="required">API Key</label>
        <input type="text" class="form-control" id="alpaca-api-key"
               value="{% if alpaca_config.credentials.api_key %}{{ alpaca_config.credentials.api_key }}{% endif %}">
    </div>

    {% include 'components/password_field.html' with field_id='alpaca-secret-key' label='Secret Key' value=alpaca_config.credentials.secret_key wrapper_class='settings-form-group' %}

    <div class="form-check mb-3 mt-3">
        <input class="form-check-input" type="checkbox" id="alpaca-paper-trading"
               {% if alpaca_config.credentials.paper_trading %}checked{% endif %}>
        <label class="form-check-label" for="alpaca-paper-trading">
            Paper Trading
            <small class="text-muted d-block">Connect to Alpaca's paper trading (simulated) environment</small>
        </label>
    </div>

    <hr class="my-3">

    <div class="settings-form-group">
        <label>Update Frequency</label>
        <div class="update-frequency-group">
            <input type="number" class="form-control update-frequency-input" id="alpaca-update-frequency"
                   min="1" max="60" step="1"
                   value="{% if alpaca_config.update_frequency %}{{ alpaca_config.update_frequency }}{% else %}15{% endif %}">
            <span>minutes</span>
        </div>
        <small class="form-text text-muted">
            <i class="bi bi-info-circle" aria-hidden="true"></i>
            Recommended: 15 minutes for optimal API performance
        </small>
    </div>
</div>
