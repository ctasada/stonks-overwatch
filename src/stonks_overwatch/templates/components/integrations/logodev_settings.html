{% load static %}
<div class="settings-card mb-4">
    <div class="card-body">
        <h6 class="fw-bold mb-3">
            <a href="https://logo.dev" target="_blank" rel="noopener noreferrer">
                <img src="{% static 'integrations/logodev.svg' %}" class="logodev-logo" alt="Logo.dev" width="96" height="21">
            </a>
        </h6>

        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="logodev-enabled"
                   {% if logodev_config.enabled %}checked{% endif %}>
            <label class="form-check-label" for="logodev-enabled">
                Enabled
            </label>
        </div>

        {% include 'components/password_field.html' with field_id='logodev-api-key' label='API Token' value=logodev_config.api_key placeholder='pk_...' wrapper_class='settings-form-group' %}

        <p class="text-muted small mt-3 mb-0">
            <a href="https://logo.dev" title="Logo API" target="_blank" rel="noopener noreferrer">Logos provided by Logo.dev</a>
        </p>
    </div>
</div>

<style>
    html[data-bs-theme="dark"] .logodev-logo { filter: invert(1); }

    @media (prefers-color-scheme: dark) {
        html:not([data-bs-theme="light"]) .logodev-logo { filter: invert(1); }
    }
</style>
